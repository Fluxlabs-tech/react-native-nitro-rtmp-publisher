buildscript {
  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:9.2.1"
  }
}

def reactNativeArchitectures() {
  def value = rootProject.getProperties().get("reactNativeArchitectures")
  return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

def isNewArchitectureEnabled() {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"
apply plugin: 'org.jetbrains.kotlin.android'
apply from: '../nitrogen/generated/android/NitroRtmpPublisher+autolinking.gradle'
apply from: "./fix-prefab.gradle"

def getExtOrDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["NitroRtmpPublisher_" + name]
}

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["NitroRtmpPublisher_" + name]).toInteger()
}

android {
  namespace "com.margelo.nitro.rtmppublisher"

  ndkVersion getExtOrDefault("ndkVersion")
  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", isNewArchitectureEnabled().toString()

    externalNativeBuild {
      cmake {
        cppFlags "-frtti -fexceptions -Wall -Wextra -fstack-protector-all"
        arguments "-DANDROID_STL=c++_shared", "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
        abiFilters (*reactNativeArchitectures())

        buildTypes {
          debug {
            cppFlags "-O1 -g"
          }
          release {
            cppFlags "-O2"
          }
        }
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  packagingOptions {
    excludes = [
            "META-INF",
            "META-INF/**",
            "**/libc++_shared.so",
            "**/libNitroModules.so",
            "**/libfbjni.so",
            "**/libjsi.so",
            "**/libfolly_json.so",
            "**/libfolly_runtime.so",
            "**/libglog.so",
            "**/libhermes.so",
            "**/libhermes-executor-debug.so",
            "**/libhermes_executor.so",
            "**/libreactnative.so",
            "**/libreactnativejni.so",
            "**/libturbomodulejsijni.so",
            "**/libreact_nativemodule_core.so",
            "**/libjscexecutor.so"
    ]
  }

  buildFeatures {
    buildConfig true
    prefab true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  sourceSets {
    main {
      if (isNewArchitectureEnabled()) {
        java.srcDirs += [
          "${project.buildDir}/generated/source/codegen/java"
        ]
      }
      // Foreground-service opt-out. Consumer sets
      // `nitroRtmpPublisherFgs=false` in their android/gradle.properties to
      // build the library without the FGS permissions and service. This is
      // useful for foreground-only apps that don't want to fill the Play
      // Console "Foreground services" declaration form. Default is `true`
      // (FGS enabled — backwards compatible).
      //
      // Runtime side detects the missing service via
      // packageManager.resolveService(...) and short-circuits with a
      // warn-once log rather than throwing ServiceNotDeclared.
      def fgsEnabled = !rootProject.hasProperty("nitroRtmpPublisherFgs") ||
                       rootProject.getProperty("nitroRtmpPublisherFgs").toString() != "false"
      if (!fgsEnabled) {
        manifest.srcFile "src/main/AndroidManifest-no-fgs.xml"
        println "[nitroRtmpPublisher] FGS support disabled — using AndroidManifest-no-fgs.xml. " +
                "Stream will not survive backgrounding on Android 14+."
      }
    }
  }
}

repositories {
  mavenCentral()
  google()
  maven { url 'https://jitpack.io' }
}

dependencies {
  //noinspection GradleDynamicVersion
  implementation "com.facebook.react:react-native:+"
  implementation project(":react-native-nitro-modules")

  // androidx.activity for ComponentActivity.addOnPictureInPictureModeChangedListener
  // (system PIP observation). appcompat pulls it in transitively at runtime but
  // only as `implementation`, so it's not on our compile classpath — declare it
  // directly. Gradle resolves up to the app's (newer) version.
  implementation "androidx.activity:activity:1.8.0"

  // RootEncoder (https://github.com/pedroSG94/RootEncoder)
  implementation "com.github.pedroSG94.RootEncoder:library:2.6.1"
}
